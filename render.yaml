services:
  # Web service - Next.js application
  - type: web
    name: flightguard-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: STORE_PATH
        value: /opt/render/project/data/policies.json
      # Add other environment variables in Render dashboard:
      # POOL_PRIVATE_KEY, POOL_ADDRESS, RAPIDAPI_KEY, ADMIN_PASSWORD, etc.
    disk:
      name: flightguard-web-data
      mountPath: /opt/render/project/data
      sizeGB: 1

  # Background worker - Checker service
  - type: worker
    name: flightguard-checker
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run checker
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORE_PATH
        value: /opt/render/project/checker-data/policies.json
      # Shares environment variables with web service
    disk:
      name: flightguard-checker-data
      mountPath: /opt/render/project/checker-data
      sizeGB: 1
