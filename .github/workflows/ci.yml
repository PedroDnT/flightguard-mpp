name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pool wallet
        env:
          POOL_PRIVATE_KEY: ${{ secrets.POOL_PRIVATE_KEY }}
          POOL_ADDRESS: ${{ secrets.POOL_ADDRESS }}
        run: |
          if [ -n "$POOL_PRIVATE_KEY" ] && [ -n "$POOL_ADDRESS" ]; then
            echo "Using existing pool wallet from secrets."
            echo "POOL_PRIVATE_KEY=$POOL_PRIVATE_KEY" >> "$GITHUB_ENV"
            echo "POOL_ADDRESS=$POOL_ADDRESS" >> "$GITHUB_ENV"
          else
            echo "No secrets found — generating ephemeral pool wallet."
            WALLET_OUTPUT=$(cast wallet new)
            NEW_ADDRESS=$(echo "$WALLET_OUTPUT" | grep -oP 'Address:\s+\K0x[0-9a-fA-F]{40}')
            NEW_PRIVATE_KEY=$(echo "$WALLET_OUTPUT" | grep -oP 'Private key:\s+\K0x[0-9a-fA-F]{64}')

            if [ -z "$NEW_ADDRESS" ] || [ -z "$NEW_PRIVATE_KEY" ]; then
              echo "ERROR: Failed to parse cast wallet new output:"
              echo "$WALLET_OUTPUT"
              exit 1
            fi

            echo "Generated address: $NEW_ADDRESS"
            echo "Funding via Tempo testnet faucet..."
            cast rpc tempo_fundAddress "$NEW_ADDRESS" --rpc-url https://rpc.moderato.tempo.xyz

            echo "POOL_PRIVATE_KEY=$NEW_PRIVATE_KEY" >> "$GITHUB_ENV"
            echo "POOL_ADDRESS=$NEW_ADDRESS" >> "$GITHUB_ENV"
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
