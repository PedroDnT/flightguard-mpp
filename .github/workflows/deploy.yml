name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  test-and-deploy:
    name: Test & Deploy to Render
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pool wallet
        env:
          POOL_PRIVATE_KEY: ${{ secrets.POOL_PRIVATE_KEY }}
          POOL_ADDRESS: ${{ secrets.POOL_ADDRESS }}
        run: |
          set -euo pipefail
          if [ -n "$POOL_PRIVATE_KEY" ] && [ -n "$POOL_ADDRESS" ]; then
            echo "Using existing pool wallet from secrets."
            echo "POOL_PRIVATE_KEY=$POOL_PRIVATE_KEY" >> "$GITHUB_ENV"
            echo "POOL_ADDRESS=$POOL_ADDRESS" >> "$GITHUB_ENV"
          else
            echo "No secrets found — generating ephemeral pool wallet."
            WALLET_OUTPUT=$(cast wallet new)
            NEW_ADDRESS=$(echo "$WALLET_OUTPUT" | grep -oP 'Address:\s+\K0x[0-9a-fA-F]{40}')
            NEW_PRIVATE_KEY=$(echo "$WALLET_OUTPUT" | grep -oP 'Private key:\s+\K0x[0-9a-fA-F]{64}')
            echo "POOL_PRIVATE_KEY=$NEW_PRIVATE_KEY" >> "$GITHUB_ENV"
            echo "POOL_ADDRESS=$NEW_ADDRESS" >> "$GITHUB_ENV"
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy."
            echo "Add it in GitHub → Settings → Secrets → Actions to enable auto-deploy."
            exit 0
          fi
          echo "🚀 Triggering Render deploy..."
          HTTP_STATUS=$(curl -s -o /tmp/render-resp.json -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")
          cat /tmp/render-resp.json
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Render deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Render deploy triggered."
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
